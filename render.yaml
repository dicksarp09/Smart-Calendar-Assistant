services:
  # Backend FastAPI Service
  - type: web
    name: calendar-backend
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: AUTH0_DOMAIN
        value: "dev-s62m25igz6sdix66.eu.auth0.com"
      - key: AUTH0_AUDIENCE
        value: "https://calendar-api"
    region: oregon
    plan: free
