services:
  # Backend FastAPI Service
  - type: web
    name: calendar-backend
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: bash -c "cd backend && /opt/render/project/src/.venv/bin/python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: AUTH0_DOMAIN
        value: "dev-s62m25igz6sdix66.eu.auth0.com"
      - key: AUTH0_AUDIENCE
        value: "https://calendar-api"
    region: oregon
    plan: free

  # Frontend Static Site
  - type: static
    name: calendar-frontend
    buildCommand: cd frontend && npm install && npm run build
    publishDirectory: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: "https://smart-calendar-assistant.onrender.com"
      - key: VITE_AUTH0_DOMAIN
        value: "dev-s62m25igz6sdix66.eu.auth0.com"
      - key: VITE_AUTH0_CLIENT_ID
        value: "ePb4S2f1GPSsDp7gZ5UbQ2KI94kJDp3M"
      - key: VITE_AUTH0_AUDIENCE
        value: "https://calendar-agent-api"
    region: oregon
    plan: free
